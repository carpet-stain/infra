name: Verify App token minting (temporary)

# Throwaway verification for #32's mint-app-token composite action — proves
# the App-token pipeline actually works end to end before #25/#26 build on
# it. Deleted once verified, same adopt-then-delete precedent this repo's
# import blocks already follow.

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - uses: ./.github/actions/mint-app-token
        id: app-token
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ secrets.GH_APP_PRIVATE_KEY }}
          repositories: infra
          permission-administration: read

      # Repo metadata reads don't need Administration at all, so that alone
      # wouldn't prove permission-administration actually took effect.
      # Rulesets are unambiguously an Administration-gated resource
      # (branch protection settings) — a successful read here is the real
      # proof the scoping mechanism works, not just that the token exists.
      - name: Confirm the minted token authenticates and carries Administration:read
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
        run: gh api repos/carpet-stain/infra/rulesets --jq '[.[] | {id, name}]'
