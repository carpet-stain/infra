name: Tofu apply

# The apply half of ADR-0003's saved-plan-on-merge model: on every push to
# main, downloads the exact tfplan-<tree-hash> artifact tofu-plan.yml
# produced for this commit's content and applies it verbatim — never a
# fresh plan. Fully automatic: PR review + merge is the checkpoint, not a
# second gate here.
#
# Keyed by tree hash, not commit SHA (ADR-0007): GitHub's rebase-merge
# always rewrites the committer info when a PR lands, so github.sha here
# never equals the SHA tofu-plan.yml actually ran for, even with an
# up-to-date branch — verified empirically, this made the lookup fail on
# every single merge until fixed. The tree hash is what's actually
# invariant, since it only reflects file content.
on:
  push:
    branches: ["main"]

permissions:
  contents: read
  actions: read

# Applies queue, they don't cancel — cancelling a half-applied tofu run
# would leave state in an unknown position. Shared group name with the
# workflow_dispatch escape hatch (#26): a manual dispatch queues behind a
# concurrent merge-apply rather than racing it.
concurrency:
  group: tofu-apply-main
  cancel-in-progress: false

jobs:
  apply:
    name: tofu apply
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      # Find and download by tree hash, not by "the tofu-plan.yml run for
      # this commit SHA" — that run never existed under this SHA, only
      # under the PR's pre-merge one (see the top-of-file comment). The
      # artifacts-list API returns each artifact's own producing run, so
      # this needs no separate "find the run" step at all: look up the
      # artifact directly by name, take its workflow_run.id, download from
      # that. Read-only, the default ephemeral token already covers it —
      # no need for the elevated App token this early.
      - name: Find and download this tree's plan artifact
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tree_sha=$(git rev-parse 'HEAD^{tree}')
          artifact=$(gh api "repos/${GITHUB_REPOSITORY}/actions/artifacts?name=tfplan-${tree_sha}&per_page=100" \
            --jq '[.artifacts[] | select(.expired == false)] | sort_by(.created_at) | reverse | .[0] // empty')
          if [[ -z "$artifact" ]]; then
            echo "::error::No plan artifact found for tree ${tree_sha} (commit ${GITHUB_SHA}) — retention expired, or the plan job never ran for this content. Not falling back to a fresh plan (ADR-0003) — use the workflow_dispatch escape hatch (#26) instead."
            exit 1
          fi
          run_id=$(echo "$artifact" | jq -r '.workflow_run.id')
          gh run download "$run_id" --name "tfplan-${tree_sha}" --dir .

      - name: Install tenv (pinned)
        env:
          TENV_VERSION: "4.14.8"
        run: |
          curl -fsSL "https://github.com/tofuutils/tenv/releases/download/v${TENV_VERSION}/tenv_v${TENV_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin tenv tofu

      # The App's private key now lives in Bitwarden's `infra` Project, not a
      # native secret (#47, ADR-0008) — read it fresh here via the CI machine
      # account (BWS_ACCESS_TOKEN, read/write on `infra`). set_env: false so
      # the key is a step output, not broadcast into the job env; sm-action
      # masks it in logs either way.
      - name: Read App private key from Bitwarden
        id: bw-key
        uses: bitwarden/sm-action@1238aae8fc64b212641190a9227c8a734ab1a793 # v3.0.1
        with:
          access_token: ${{ secrets.BWS_ACCESS_TOKEN }}
          set_env: false
          secrets: |
            ${{ vars.BWS_APP_KEY_SECRET_ID }} > GH_APP_PRIVATE_KEY

      # Scoped to exactly what main.tf's resources write: Administration
      # (repo settings, rulesets) and Issues (labels) — nothing else, and
      # only for the repos this apply actually touches.
      - name: Mint elevated App token
        id: app-token
        uses: ./.github/actions/mint-app-token
        with:
          client-id: ${{ vars.GH_APP_CLIENT_ID }}
          private-key: ${{ steps.bw-key.outputs.GH_APP_PRIVATE_KEY }}
          repositories: dotfiles,infra,project-starter-template
          permission-administration: write
          permission-issues: write

      # Mirrors .envrc's own derivation exactly (ADR-0002), same pattern
      # tofu-plan.yml uses — plain bash string concatenation, never GitHub
      # Actions `${{ }}` template interpolation inside a run: script. The
      # R2 credential here is Read & Write (unlike tofu-plan.yml's
      # deliberately read-only one) since apply has to write state.
      - name: tofu init + apply
        env:
          TENV_AUTO_INSTALL: "true"
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
          TF_STATE_PASSPHRASE: ${{ secrets.TF_STATE_PASSPHRASE }}
          R2_APPLY_STORAGE_TOKEN: ${{ secrets.R2_APPLY_STORAGE_TOKEN }}
          AWS_ACCESS_KEY_ID: ${{ secrets.R2_APPLY_ACCESS_KEY_ID }}
          R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
          # The bitwarden-secrets provider (ADR-0008) is configured from the
          # environment even for a saved-plan apply — CI machine account
          # token + org UUID, plus the Project id the secret resources file
          # under (TF_VAR).
          BW_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
          BW_ORGANIZATION_ID: ${{ secrets.BWS_ORGANIZATION_ID }}
          TF_VAR_bws_infra_project_id: ${{ vars.BWS_INFRA_PROJECT_ID }}
        run: |
          AWS_SECRET_ACCESS_KEY="$(printf '%s' "$R2_APPLY_STORAGE_TOKEN" | shasum -a 256 | cut -d' ' -f1)"
          export AWS_SECRET_ACCESS_KEY
          export AWS_ENDPOINT_URL_S3="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          export TF_ENCRYPTION='
          key_provider "pbkdf2" "state" {
            passphrase = "'"$TF_STATE_PASSPHRASE"'"
          }
          method "aes_gcm" "state" {
            keys = key_provider.pbkdf2.state
          }
          state {
            method   = method.aes_gcm.state
            enforced = true
          }
          plan {
            method   = method.aes_gcm.state
            enforced = true
          }'
          tofu init -input=false
          # Applies the exact downloaded plan, not a fresh one — the whole
          # point of the saved-plan-on-merge model (ADR-0003). Normal
          # locking (no -lock=false, unlike the plan job): this writes
          # state, and the R2 backend's use_lockfile locking is the safety
          # net against a concurrent manual `just tofu-apply`.
          tofu apply -input=false tfplan
