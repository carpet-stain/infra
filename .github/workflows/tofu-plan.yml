name: Tofu plan

# The read-only half of ADR-0003's saved-plan-on-merge model: plans every PR
# push, uploads the (already-encrypted, ADR-0002 TF_ENCRYPTION) plan file as
# a tree-hash-keyed artifact for the merge-time apply workflow to consume
# later (#25), and upserts a single PR comment with the rendered plan.
# Keyed by tree hash, not commit SHA (ADR-0007) — GitHub's rebase-merge
# always rewrites the committer info when a PR lands, so the merge SHA
# never equals the SHA this job ran for, even with an up-to-date branch;
# the tree hash is what's actually invariant. Disjoint from tofu.yml's
# fmt/tflint/trivy job — this one touches state, so it needs its own,
# narrower credential surface (see AGENTS.md's Credentials section for
# what these secrets are and how they're provisioned).
on:
  pull_request:
    types: [opened, reopened, synchronize, ready_for_review]
    branches: ["main"]

permissions:
  contents: read
  pull-requests: write

concurrency:
  group: tofu-plan-${{ github.event.pull_request.number }}
  cancel-in-progress: true

jobs:
  plan:
    name: tofu plan
    runs-on: ubuntu-latest
    # Same per-job draft gate as tofu.yml/pr-guards.yml: quiet on WIP drafts,
    # re-triggered for real at ready_for_review.
    if: github.event.pull_request.draft == false
    # Read-only credentials only (#24's acceptance criterion) — no
    # Administration-scoped or write-capable GitHub secret reaches this job.
    # The one exception is BWS_ACCESS_TOKEN: the CI machine account is
    # read/write on `infra` (a plan refresh only reads the two
    # bitwarden-secrets, but the same account does the apply-side writes),
    # and a fourth, read-only machine account would exceed Bitwarden's
    # free-tier three-account cap (ADR-0008) — a deliberate tradeoff, since
    # the token still can't reach `vended-tokens` at all.
    env:
      GITHUB_TOKEN: ${{ secrets.GH_TOKEN }}
      TF_STATE_PASSPHRASE: ${{ secrets.TF_STATE_PASSPHRASE }}
      R2_PLAN_STORAGE_TOKEN: ${{ secrets.R2_PLAN_STORAGE_TOKEN }}
      AWS_ACCESS_KEY_ID: ${{ secrets.R2_PLAN_ACCESS_KEY_ID }}
      R2_ACCOUNT_ID: ${{ secrets.R2_ACCOUNT_ID }}
      # The bitwarden-secrets provider (ADR-0008) configures from the
      # environment; a plan refreshes the App-key and Cloudflare-token
      # secrets, which needs read on `infra`.
      BW_ACCESS_TOKEN: ${{ secrets.BWS_ACCESS_TOKEN }}
      BW_ORGANIZATION_ID: ${{ secrets.BWS_ORGANIZATION_ID }}
      TF_VAR_bws_infra_project_id: ${{ vars.BWS_INFRA_PROJECT_ID }}
    steps:
      - uses: actions/checkout@v7

      - name: Install tenv (pinned)
        env:
          TENV_VERSION: "4.14.8"
        run: |
          curl -fsSL "https://github.com/tofuutils/tenv/releases/download/v${TENV_VERSION}/tenv_v${TENV_VERSION}_Linux_x86_64.tar.gz" \
            | sudo tar -xz -C /usr/local/bin tenv tofu

      # Mirrors .envrc's own derivation exactly (ADR-0002): the R2 S3 secret
      # is sha256(storage token), the endpoint carries the account ID, and
      # TF_ENCRYPTION is built from the shared passphrase via plain bash
      # string concatenation — never GitHub Actions `${{ }}` template
      # interpolation inside a run: script, which would risk the secret
      # breaking out of its quoting if it ever contained shell metacharacters.
      - name: tofu init + plan
        id: plan
        env:
          TENV_AUTO_INSTALL: "true"
        run: |
          AWS_SECRET_ACCESS_KEY="$(printf '%s' "$R2_PLAN_STORAGE_TOKEN" | shasum -a 256 | cut -d' ' -f1)"
          export AWS_SECRET_ACCESS_KEY
          export AWS_ENDPOINT_URL_S3="https://${R2_ACCOUNT_ID}.r2.cloudflarestorage.com"
          export TF_ENCRYPTION='
          key_provider "pbkdf2" "state" {
            passphrase = "'"$TF_STATE_PASSPHRASE"'"
          }
          method "aes_gcm" "state" {
            keys = key_provider.pbkdf2.state
          }
          state {
            method   = method.aes_gcm.state
            enforced = true
          }
          plan {
            method   = method.aes_gcm.state
            enforced = true
          }'
          tofu init -input=false
          # -lock=false: this job's R2 credential is read-only by design
          # (#24's acceptance criterion), so it can't acquire the S3
          # backend's write-based lock at all — and doesn't need to, since a
          # plan never writes state. Same reasoning HCP Terraform's own
          # read-only "speculative plans" use to skip locking entirely.
          tofu plan -out=tfplan -input=false -lock=false
          # Rendered here, not in a later step: TF_ENCRYPTION only exists in
          # this step's own shell process (each workflow step is a separate
          # invocation), and the plan file needs it to decrypt.
          tofu show -no-color tfplan > plan.txt
          # The artifact's real key (ADR-0007) — see the top-of-file
          # comment for why tree hash, not commit SHA.
          echo "tree_sha=$(git rev-parse 'HEAD^{tree}')" >>"$GITHUB_OUTPUT"

      # 7 days, not ADR-0003's original 2: a tighter window meant an
      # ordinary multi-day solo-review cycle alone could outlive the
      # artifact before merge. Outliving it isn't unsafe either way — the
      # apply workflow's escape hatch (#26) covers a missing artifact by
      # design — just friction worth reducing. See AGENTS.md's Branch & PR
      # model for the stale-artifact runbook pointer.
      - uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ steps.plan.outputs.tree_sha }}
          path: tfplan
          retention-days: 7

      - name: Upsert PR comment with the rendered plan
        env:
          TREE_SHA: ${{ steps.plan.outputs.tree_sha }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          marker="<!-- tofu-plan -->"
          body_file="$(mktemp)"
          {
            echo "$marker"
            echo
            echo "### \`tofu plan\` for \`${GITHUB_SHA}\` (tree \`${TREE_SHA}\`)"
            echo
            echo '```'
            cat plan.txt
            echo '```'
          } >"$body_file"

          comment_id=$(gh api "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" --paginate \
            --jq ".[] | select(.body | startswith(\"$marker\")) | .id" | head -n1)

          if [[ -n "$comment_id" ]]; then
            gh api --method PATCH "repos/${GITHUB_REPOSITORY}/issues/comments/${comment_id}" -F body=@"$body_file"
          else
            gh api --method POST "repos/${GITHUB_REPOSITORY}/issues/${PR_NUMBER}/comments" -F body=@"$body_file"
          fi
