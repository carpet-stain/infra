name: Mint GitHub App token
description: >
  Mints a short-lived (1-hour), narrowly-scoped installation token from
  this repo's own GitHub App (ADR-0004). Only infra's own CI workflows
  call this — no other managed repo mints from this App (ADR-0005). Every
  call site sets permission-* explicitly; create-github-app-token's
  narrowing is opt-in, without it the token carries the App's entire
  registered grant.

inputs:
  client-id:
    description: >
      The App's client ID (vars.GH_APP_CLIENT_ID, app.tf) — not secret,
      but a composite action can't read the caller's vars/secrets context
      implicitly, so the calling workflow passes it through explicitly.
    required: true
  private-key:
    description: >
      The App's private key — now read from Bitwarden's `infra` Project via
      bitwarden/sm-action (app.tf, ADR-0008), no longer a native secret.
      Same pass-through requirement as client-id: the caller reads it and
      passes it in explicitly.
    required: true
  repositories:
    description: Comma or newline-separated repos the token can access.
    required: true
  permission-administration:
    description: >
      Administration permission level for the minted token (e.g. "write")
      — repo settings and rulesets. Leave unset for no Administration
      access.
    required: false
    default: ""
  permission-contents:
    description: >
      Contents permission level for the minted token (e.g. "write") — repo
      file contents and commits. Leave unset for no Contents access.
    required: false
    default: ""
  permission-issues:
    description: >
      Issues permission level for the minted token (e.g. "write") — labels
      go through this category, not Administration. Leave unset for no
      Issues access.
    required: false
    default: ""
  permission-pull-requests:
    description: >
      Pull requests permission level for the minted token (e.g. "write").
      Leave unset for no Pull requests access.
    required: false
    default: ""
  permission-secrets:
    description: >
      Secrets permission level for the minted token (e.g. "read") — a
      fresh `tofu plan` refreshes every resource including
      github_actions_secret, which needs this even just to confirm the
      resource still exists. Only a saved-plan `tofu apply` (no refresh)
      can skip it. Leave unset for no Secrets access. Add more
      permission-* passthroughs here if a future consumer needs a category
      none of these three cover — but not `permission-variables`:
      actions/create-github-app-token has no such input at all
      (actions/create-github-app-token#231, open upstream), which is why
      `github_actions_variable` resources aren't tofu-managed here (app.tf).
    required: false
    default: ""

outputs:
  token:
    description: The minted, scoped installation token.
    value: ${{ steps.mint.outputs.token }}

runs:
  using: composite
  steps:
    - name: Mint scoped token
      id: mint
      uses: actions/create-github-app-token@bcd2ba49218906704ab6c1aa796996da409d3eb1 # v3.2.0
      with:
        client-id: ${{ inputs.client-id }}
        private-key: ${{ inputs.private-key }}
        repositories: ${{ inputs.repositories }}
        permission-administration: ${{ inputs.permission-administration }}
        permission-contents: ${{ inputs.permission-contents }}
        permission-issues: ${{ inputs.permission-issues }}
        permission-pull-requests: ${{ inputs.permission-pull-requests }}
        permission-secrets: ${{ inputs.permission-secrets }}
